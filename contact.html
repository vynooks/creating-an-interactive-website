<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Interactive Webpage</title>
</head>
<div class="container">
<body>
    <div class="header-top">
        <h1 class="style-grey">Contact page</h1>
        <span class="no-border">
            <span class="circle"></span>
            <span class="circle"></span>
            <span class="circle circle-blue"> </span>
        </span>
    </div>
        <div class="container">
    <header>
        <h1><img id="img" src="image/star_web_logo.jpg" alt="Starlight Blades Logo" class="logo" style="width: 100px;"> Starlight Blades</h1>
        <div class="div2 border a:hover">
            <a href="index.html">Home</a><br>
        </div>
        <div class="div1 border a:hover">
            <a href="contact.html">Contact us</a><br>
        </div>
    </header>
        <main>
            <form class="no-border">
            <form class="contact-form">
                <div class="form-row">
                    <label for="name">Your name:</label>
                    <input type="text" id="name" name="name" required><br>
                </div>
                <div class="form-row border">
                    <label for="email">Your email:</label>
                    <input type="email" id="email" name="email" required><br>
                </div>
                <div class="form-row">
                    <label for="message">Your message:</label>
                    <textarea id="message" name="message" required></textarea><br>
                </div>
                    <div>
                    <button type="submit">Submit</button>
                </div>
            </form>
            </form>
        </main>
    <footer>
        <p>Created by Allyson Licerio <br>
        <a href="#" target="_blank">Follow us on Twitter</a></p>
    </footer>
        </div>
</body>
</div>
</html>
